services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: antenna
      POSTGRES_USER: antenna
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    shm_size: '256mb'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Seoul
      ENV: ${ENV:-local}
      DATABASE_URL: postgresql://antenna:${DB_PASSWORD}@db:5432/antenna
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5200}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      FRED_API_KEY: ${FRED_API_KEY}
      ECOS_API_KEY: ${ECOS_API_KEY}
      RABBITMQ_URL: amqp://antenna:${RABBITMQ_PASSWORD}@rabbitmq:5672//
      REDIS_URL: redis://:${REDIS_PASSWORD:-localdev}@redis:6379/0
    volumes:
      - ./user_data:/app/user_data
    depends_on:
      - db
    ports:
      - "127.0.0.1:7002:7002"
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew; done'"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: antenna
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:15672:15672"
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-localdev}
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    environment:
      TZ: Asia/Seoul
      ENV: ${ENV:-local}
      DATABASE_URL: postgresql://antenna:${DB_PASSWORD}@db:5432/antenna
      CELERY_BROKER_URL: amqp://antenna:${RABBITMQ_PASSWORD}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-localdev}@redis:6379/0
    depends_on:
      - db
      - rabbitmq
      - redis
    restart: always

volumes:
  timescaledb_data:
